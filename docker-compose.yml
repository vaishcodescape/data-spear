services:
  # Optional local Postgres to experiment against. The API container reaches it by
  # the service name `postgres`, e.g.:
  #   ./scripts/data-spear.sh connect --host postgres --dbname postgres --user postgres --password postgres
  # Delete this service (and the api `depends_on` / `PG_DSN` below) if you connect to
  # a hosted database (Neon, Supabase, RDS, ...) instead.
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Data-Spear API ───────────────────────────────────────────────────────────
  api:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Single worker: the agent keeps the active DB connection in per-process state.
      UVICORN_WORKERS: 1
      # In-container fallback DSN pointing at the bundled postgres service above.
      PG_DSN: postgresql://postgres:postgres@postgres:5432/postgres
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
